services:
  weather:
    build: .
    image: weather-cli
    container_name: weather-cli
    # install deps into the anon volume on every start, then keep alive
    entrypoint: ["sh", "-c", "npm install --omit=dev && sleep infinity"]
    environment:
      # home directory = /app, so weather-data.json lands in the project
      - HOME=/app
      # disable ash history — no need for it in a throwaway container
      - HISTFILE=/dev/null
      # keep npm cache out of the mounted project dir
      - npm_config_cache=/tmp/.npm
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
